name: Build WNACG Only
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout entire extensions-source repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 仅编译 wnacg 单个扩展
      - name: Build single extension wnacg
        run: ./gradlew :src:zh:wnacg:assemble

      # 上传产物jar
      - name: Upload built extension jar
        uses: actions/upload-artifact@v4
        with:
          path: src/zh/wnacg/build/outputs/ext/*.ext.kotlin.jar
